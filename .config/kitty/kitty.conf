include themes/matugen.conf
window_padding_width 5
hide_window_decorations yes
background_opacity 0.8
font_family          Maple Mono NF CN Regular
bold_font            Maple Mono NF CN Bold
italic_font          Maple Mono NF CN Italic
bold_italic_font     Maple Mono NF CN Bold Italic
modify_font          cell_width 100%
modify_font          cell_height 100%

font_features        MapleMono-NF-CN-Regular +cv01 +ss05
font_features        MapleMono-NF-CN-Light +cv01 +ss05
font_features        MapleMono-NF-CN-Bold +cv01 +ss05
font_features        MapleMono-NF-CN-Italic +cv01 +ss05
font_features        MapleMono-NF-CN-BoldItalic +cv01 +ss05

remember_window_size no
confirm_os_window_close 0
shell fish
cursor_trail 1 
cursor_shape block
shell_integration no-cursor

# BEGIN_KITTY_THEME
# Matugen
include current-theme.conf
# END_KITTY_THEME
